services:
  db:
    image: mysql:8.0
    container_name: hospital1-demo-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hospital_demo}
      MYSQL_USER: ${MYSQL_USER:-hospital}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-hospital_demo_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-hospital_root_password}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
