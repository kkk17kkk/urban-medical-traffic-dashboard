{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>综合治理信息提交</title>
    <link rel="stylesheet" type="text/css" href="{% static 'css/reset.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/scanboard.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/table.css' %}">
    <style>
        .demo-form { max-width: 980px; margin: 28px auto; color: #fff; }
        .demo-form table { width: 100%; border-collapse: collapse; background: rgba(6, 31, 56, .72); }
        .demo-form td { padding: 14px; border: 1px solid rgba(30, 182, 254, .35); }
        .demo-form select, .demo-form input {
            width: 100%; box-sizing: border-box; padding: 8px 10px; color: #fff;
            border: 1px solid #1eb6fe; background: rgba(0, 20, 42, .72);
        }
        .demo-actions { display: flex; justify-content: center; gap: 16px; padding: 18px; }
        .demo-actions button { min-width: 120px; padding: 10px 18px; color: #fff; background: #0b8fce; border: 0; cursor: pointer; }
        .message-list { max-width: 980px; margin: 12px auto; color: #00deff; text-align: center; }
    </style>
</head>
<body>
<div class="scanboardWp animsition">
    <div id="top">
        <div class="wp clearfix">
            <div class="left pageTit"><a class="summaryBtn" href="javascript:history.back()">返回</a></div>
            <div class="center topLogo"><a><img src="{% static 'images/tit.png' %}"></a></div>
            <div class="right topBar">
                <div class="topTime">时间加载中...</div>
                <div class="clearfix"><a class="signOut fr" href="{% url 'logout' %}">退出</a></div>
            </div>
        </div>
    </div>
    {% if messages %}
        <div class="message-list">{% for message in messages %}<p>{{ message }}</p>{% endfor %}</div>
    {% endif %}
    <div class="item billState demo-form">
        <div class="itemTit"><span class="border-green">卫健委综合治理信息提交</span></div>
        <form method="post" action="{% url 'zhzl' %}">
            {% csrf_token %}
            <table>
                <tr><td>医院</td><td><select name="hospital_id" required>{% for hospital in hospitals %}<option value="{{ hospital.id }}">{{ hospital.id }} - {{ hospital.h_name }}（{{ hospital.h_area }}）</option>{% endfor %}</select></td></tr>
                <tr><td>治理类型</td><td><select name="zhzl_type"><option value="1">首次治理</option><option value="2">复核治理</option></select></td></tr>
                <tr><td>上下午门诊号源比例</td><td><input type="number" step="0.01" name="HYBL"></td></tr>
                <tr><td>预约就诊率</td><td><input type="number" step="0.01" name="JZL"></td></tr>
                <tr><td>预约就诊精准时间</td><td><input type="number" step="0.01" name="JZSJ"></td></tr>
                <tr><td>停车位开放比例</td><td><input type="number" step="0.01" name="TCW"></td></tr>
                <tr><td>是否建设智能治理系统</td><td><select name="ZNXT"><option value="否">否</option><option value="是">是</option></select></td></tr>
                <tr><td>是否设置禁停标志标线</td><td><select name="JT"><option value="否">否</option><option value="是">是</option></select></td></tr>
                <tr><td>是否设置行人过街设施</td><td><select name="GJ"><option value="否">否</option><option value="是">是</option></select></td></tr>
                <tr><td>是否设置限速或减速标识</td><td><select name="XSJS"><option value="否">否</option><option value="是">是</option></select></td></tr>
                <tr><td>是否设置注意行人标志</td><td><select name="XR"><option value="否">否</option><option value="是">是</option></select></td></tr>
                <tr><td>非现场执法监拍设施是否覆盖</td><td><select name="JP"><option value="否">否</option><option value="是">是</option></select></td></tr>
                <tr><td>是否具备无障碍设施</td><td><select name="WZA"><option value="否">否</option><option value="是">是</option></select></td></tr>
            </table>
            <div class="demo-actions"><button type="submit">提交</button><button type="reset">重置</button></div>
        </form>
    </div>
</div>
<script type="text/javascript" src="{% static 'js/jquery.min.js' %}"></script>
</body>
</html>
